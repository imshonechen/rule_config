# =========================
# 分流规则
# =========================
# 注意：分流规则按自上而下、首次命中即停的原则匹配

rules:
  #####################################
  # 拦 QUIC：UDP/443
  - AND,((NETWORK,UDP),(DST-PORT,443)),REJECT
  #####################################
  # 端口白名单：特殊端口
  # - NOT,((DST-PORT,21/22/23/53/80/123/143/194/443/465/587/853/993/995/998/2052-2053/2082-2083/2086/2095-2096/3389/5222/5228-5230/8080/8443/8880/8888-8889)),DIRECT
  # 私网/LAN
  - RULE-SET,private,直连
  - RULE-SET,privateIP,直连,no-resolve
  #####################################
  # 广告拦截
  - RULE-SET,category-ads-all,去广告
  #####################################
  # 自定义强制直连或代理
  - RULE-SET,go_cn,直连,no-resolve
  - RULE-SET,go_global,默认选择,no-resolve
  #####################################
  # Emby相关
  - RULE-SET,emby_service,Emby,no-resolve
  - RULE-SET,loser,Emby,no-resolve
  - RULE-SET,category-emby,Emby,no-resolve
