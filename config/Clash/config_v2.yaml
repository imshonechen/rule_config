# =========================
# 手动节点（可选）
# =========================
proxies:
# 在此粘贴你的节点，格式示例：
#   - name: 节点名称
#     type: vless
#     server: xxx
#     ...

# =========================
# 订阅链接（填入后自动拉取节点）
# =========================
# 把 url 替换成你的 Clash 订阅链接，不用的订阅保持不变即可

# 节点名称重命名规则锚点
proxy-name-rules: &proxy-name-rules
  - pattern: "[\\x{2600}-\\x{26FF}\\x{2700}-\\x{27BF}\\x{20E3}\\x{200D}\\x{1F1E6}-\\x{1F1FF}\\x{1F300}-\\x{1F6FF}\\x{1F900}-\\x{1FAFF}]+"
    target: null
  - pattern: '(?i)(.*?)\s*(\bHong\s?Kong\b|\bHKG?\b|\bHK\b|深港)\s*(香港)?(.*)'
    target: '$1香港$4'
  - pattern: '(?i)(.*?)\s*(\bTaiwan\b|\bTWN?\b|\bTW\b|臺灣)\s*(台湾)?(.*)'
    target: '$1台湾$4'
  - pattern: '(?i)(.*?)\s*(\bJapan\b|\bJPN?\b|\bJP\b|沪日)\s*(日本)?(.*)'
    target: '$1日本$4'
  - pattern: '(?i)(.*?)\s*(\bSouth\s?Korea\b|\bKorea\b|\bKR\b|\bKO?R\b)\s*(韩国)?(.*)'
    target: '$1韩国$4'
  - pattern: '(?i)(.*?)\s*(\bSingapore\b|\bSGP?\b|\bSG\b)\s*(狮城|新加坡)?(.*)'
    target: '$1新加坡$4'
  - pattern: '(?i)(.*?)\s*(\bUnited\s?States\b|\bUSA?\b|\bAmerica\b)\s*(美国)?(.*)'
    target: '$1美国$4'
  - pattern: '(?i)(.*?)\s*(\bMalaysia\b|\bMYS?\b)\s*(马来西亚)?(.*)'
    target: '$1马来西亚$4'
  - pattern: '(?i)(.*?)\s*(\bCanada\b|\bCAN?\b)\s*(加拿大)?(.*)'
    target: '$1加拿大$4'
  - pattern: '(?i)(.*?)\s*(\bViet\s?Nam\b|\bVNM?\b)\s*(越南)?(.*)'
    target: '$1越南$4'
  - pattern: '(?i)(.*?)\s*(\bIndia\b|\bIND?\b)\s*(印度)?(.*)'
    target: '$1印度$4'
  - pattern: '(?i)(.*?)\s*(\bAustralia\b|\bAUS?\b)\s*(澳洲|澳大利亚)?(.*)'
    target: '$1澳大利亚$4'
  - pattern: '(?i)(.*?)\s*(\bGermany\b|\bDEU?\b)\s*(德国)?(.*)'
    target: '$1德国$4'
  - pattern: '(?i)(.*?)\s*(\bFrance\b|\bFRA?\b)\s*(法国)?(.*)'
    target: '$1法国$4'
  - pattern: '(?i)(.*?)\s*(\bNetherlands\b|\bNLD?\b)\s*(荷兰)?(.*)'
    target: '$1荷兰$4'
  - pattern: '(?i)(.*?)\s*(\bTurkey\b|\bTU?R\b)\s*(土耳其)?(.*)'
    target: '$1土耳其$4'
  - pattern: '(?i)(.*?)\s*(\bUkraine\b|\bUKR\b|\bUA\b)\s*(乌克兰)?(.*)'
    target: '$1乌克兰$4'
  - pattern: '(?i)(.*?)\s*(\bUnited\s?Kingdom\b|\bUK\b|\bGBR?\b|\bEngland\b)\s*(英国)?(.*)'
    target: '$1英国$4'
  - pattern: '(?i)(.*?)\s*(\bThailand\b|\bTHA?\b)\s*(泰国)?(.*)'
    target: '$1泰国$4'
  - pattern: '(?i)(.*?)\s*(\bRussia\b|\bRussian\b|\bRUS?\b)\s*(俄罗斯)?(.*)'
    target: '$1俄罗斯$4'
  - pattern: '(?i)(.*?)\s*(\bAntarctica\b|\bATA\b|\bAQ\b)\s*(南极洲)?(.*)'
    target: '$1南极洲$4'
  - pattern: '(?i)(.*?)\s*(\bEgypt\b|\bEGY?\b)\s*(埃及)?(.*)'
    target: '$1埃及$4'
  - pattern: '(?i)(.*?)\s*(\bItaly\b|\bITA?\b)\s*(意大利)?(.*)'
    target: '$1意大利$4'
  - pattern: '(?i)(.*?)\s*(\bIndonesia\b|\bIDN?\b|\b印度尼西亚\b)\s*(印尼)?(.*)'
    target: '$1印尼$4'
  - pattern: '(?i)(.*?)\s*(\bMacao\b|\bMacau\b|\bMAC\b|\bMO\b)\s*(澳门)?(.*)'
    target: '$1澳门$4'
  - pattern: '(?i)(.*?)\s*(\bNigeria\b|\bNGA?\b)\s*(尼日利亚)?(.*)'
    target: '$1尼日利亚$4'
  - pattern: '(?i)(.*?)\s*(\bArgentina\b|\bARG?\b)\s*(阿根廷)?(.*)'
    target: '$1阿根廷$4'
  - pattern: '(?i)(.*?)\s*(\bBrazil\b|\bBRA?\b)\s*(巴西)?(.*)'
    target: '$1巴西$4'
  - pattern: '(?i)\s(\d+(?:\.\d+)?|\.\d+)\s*(?:倍|倍率|X)'
    target: ' $1x'
  - pattern: '(?i)([\[\(|])(\d+(?:\.\d+)?|\.\d+)\s*(?:倍|倍率|X)([\]\)|])'
    target: '$1$2x$3'

proxy-providers:
  订阅1: {type: http, url: "https://ryanvanson.github.io/emptyyaml/empty.yaml", path: ./providers/sub1.yaml, interval: 3600, health-check: {enable: true, url: "https://cp.cloudflare.com", interval: 300, lazy: true}, override: {additional-prefix: 'ᴬ', proxy-name: *proxy-name-rules}}
  # 订阅2: {type: http, url: "https://ryanvanson.github.io/emptyyaml/empty.yaml", path: ./providers/sub2.yaml, interval: 3600, health-check: {enable: true, url: "https://cp.cloudflare.com", interval: 300, lazy: true}, override: {additional-prefix: 'ᴮ', proxy-name: *proxy-name-rules}}
  # 订阅3: {type: http, url: "https://ryanvanson.github.io/emptyyaml/empty.yaml", path: ./providers/sub3.yaml, interval: 3600, health-check: {enable: true, url: "https://cp.cloudflare.com", interval: 300, lazy: true}, override: {additional-prefix: 'ᶜ', proxy-name: *proxy-name-rules}}
  # 订阅4: {type: http, url: "https://ryanvanson.github.io/emptyyaml/empty.yaml", path: ./providers/sub4.yaml, interval: 3600, health-check: {enable: true, url: "https://cp.cloudflare.com", interval: 300, lazy: true}, override: {additional-prefix: 'ᴰ', proxy-name: *proxy-name-rules}}
  # 订阅5: {type: http, url: "https://ryanvanson.github.io/emptyyaml/empty.yaml", path: ./providers/sub5.yaml, interval: 3600, health-check: {enable: true, url: "https://cp.cloudflare.com", interval: 300, lazy: true}, override: {additional-prefix: 'ᴱ', proxy-name: *proxy-name-rules}}

# =========================
# 代理组配置
# =========================
# - include-all-proxies: true  包含手动节点
# - use: [订阅1, 订阅2, 订阅3, 订阅4, 订阅5] 包含订阅节点
# - domain-strategy: ipv4-only 强制仅使用 IPv4
# =========================

# 该锚点为: 筛选香港节点中 小于等于1倍率 的节点
hk_s: &hk_s {filter: '(?i)^(?=.*(?:🇭🇰|香港|HK|HKG|Hong\s*Kong|HongKong))(?!.*(?:^|[^0-9.])(?:1\.(?:0*[1-9]\d*)|[2-9]\d*(?:\.\d+)?|\d{2,}(?:\.\d+)?)(?:\s*)(?:[xX×]|倍|倍率)\b)(?!.*(?:^|[^0-9.])(?:1\.(?:0*[1-9]\d*)|[2-9]\d*\.\d+|[1-9]\d+\.\d+)\s*$).*$'}
# 该锚点为: 筛选台湾节点中 小于等于1倍率 的节点
tw_s: &tw_s {filter: '(?i)^(?=.*(?:🇹🇼|台湾|台灣|\bTW\b|\bTWN\b|Taiwan|Taipei))(?!.*(?:^|[^0-9.])(?:1\.(?:0*[1-9]\d*)|[2-9]\d*(?:\.\d+)?|\d{2,}(?:\.\d+)?)(?:\s*)(?:[xX×]|倍|倍率)\b)(?!.*(?:^|[^0-9.])(?:1\.(?:0*[1-9]\d*)|[2-9]\d*\.\d+|[1-9]\d+\.\d+)\s*$).*$'}
# 该锚点为: 筛选日本节点中 小于等于1倍率 的节点
jp_s: &jp_s {filter: '(?i)^(?=.*(?:🇯🇵|日本|\bJP\b|\bJPN\b|Japan|Tokyo|Osaka))(?!.*(?:^|[^0-9.])(?:1\.(?:0*[1-9]\d*)|[2-9]\d*(?:\.\d+)?|\d{2,}(?:\.\d+)?)(?:\s*)(?:[xX×]|倍|倍率)\b)(?!.*(?:^|[^0-9.])(?:1\.(?:0*[1-9]\d*)|[2-9]\d*\.\d+|[1-9]\d+\.\d+)\s*$).*$'}
# 该锚点为: 筛选新加坡节点中 小于等于1倍率 的节点
sg_s: &sg_s {filter: '(?i)^(?=.*(?:🇸🇬|新加坡|\bSG\b|\bSGP\b|Singapore))(?!.*(?:^|[^0-9.])(?:1\.(?:0*[1-9]\d*)|[2-9]\d*(?:\.\d+)?|\d{2,}(?:\.\d+)?)(?:\s*)(?:[xX×]|倍|倍率)\b)(?!.*(?:^|[^0-9.])(?:1\.(?:0*[1-9]\d*)|[2-9]\d*\.\d+|[1-9]\d+\.\d+)\s*$).*$'}
# 该锚点为: 筛选美国节点中 小于等于1倍率 的节点
us_s: &us_s {filter: '(?i)^(?=.*(?:🇺🇸|美国|美國|\bUS\b|\bUSA\b|United\s*States|America))(?!.*(?:^|[^0-9.])(?:1\.(?:0*[1-9]\d*)|[2-9]\d*(?:\.\d+)?|\d{2,}(?:\.\d+)?)(?:\s*)(?:[xX×]|倍|倍率)\b)(?!.*(?:^|[^0-9.])(?:1\.(?:0*[1-9]\d*)|[2-9]\d*\.\d+|[1-9]\d+\.\d+)\s*$).*$'}
# 该锚点为: 筛选 大于1倍率 的高倍率节点
high_rate: &high_rate {filter: '(?i)^(?=.*(?:^|[^0-9.])(?:1\.(?:0*[1-9]\d*)|[2-9]\d*(?:\.\d+)?|\d{2,}(?:\.\d+)?)(?:\s*)(?:[xX×]|倍|倍率)\b|(?:^|[^0-9.])(?:1\.(?:0*[1-9]\d*)|[2-9]\d*\.\d+|[1-9]\d+\.\d+)\s*$).*$'}
# 该锚点为: 排除关键关键词的节点
ef: &ef {url: 'https://cp.cloudflare.com', exclude-filter: "(?i)建议|过滤|剩余|流量|重置|距离|套餐|官网|网址|到期|direct|Traffic|Expire|Reset"}
proxy-groups:
  - { name: 默认选择, type: select, proxies: [香港节点,台湾节点,日本节点,新加坡节点,美国节点,高倍率,直连], include-all: true, <<: *ef }
  - { name: 香港节点, type: select, proxies: [香港最快,香港故转], include-all: true,  <<: [*hk_s, *ef] }
  - { name: 台湾节点, type: select, proxies: [台湾最快,台湾故转], include-all: true, <<: [*tw_s, *ef] }
  - { name: 日本节点, type: select, proxies: [日本最快,日本故转], include-all: true, <<: [*jp_s, *ef] }
  - { name: 新加坡节点, type: select, proxies: [新加坡最快,新加坡故转], include-all: true, <<: [*sg_s, *ef] }
  - { name: 美国节点, type: select, proxies: [美国最快,美国故转], include-all: true, <<: [*us_s, *ef] }
  - { name: 链式前置, type: select, proxies: [直连],include-all-providers: true, <<: *ef }
  - { name: 高倍率, type: select, include-all: true, <<: [*high_rate, *ef] }
  - { name: Emby, type: select, proxies: [直连,默认选择,香港节点,台湾节点,日本节点,新加坡节点,美国节点], include-all: true, <<: *ef }
  - { name: PT, type: select, proxies: [直连,默认选择,香港节点,台湾节点,日本节点,新加坡节点,美国节点], include-all: true, <<: *ef }
  - { name: GitHub, type: select, proxies: [香港节点,默认选择,直连,台湾节点,日本节点,新加坡节点,美国节点], include-all: true, <<: *ef }
  - { name: AI服务, type: select, proxies: [美国节点,默认选择,直连,香港节点,台湾节点,日本节点,新加坡节点], include-all: true, <<: *ef }
  - { name: 教育学术, type: select, proxies: [美国节点,默认选择,直连,香港节点,台湾节点,日本节点,新加坡节点], include-all: true, <<: *ef }
  - { name: 电报, type: select, proxies: [新加坡节点,默认选择,直连,香港节点,台湾节点,日本节点,美国节点], include-all: true, <<: *ef }
  - { name: 社交媒体, type: select, proxies: [美国节点,默认选择,直连,香港节点,台湾节点,日本节点,新加坡节点], include-all: true, <<: *ef }
  - { name: Spotify, type: select, proxies: [直连,香港故转,台湾故转,日本故转,新加坡故转,美国故转], include-all: true, <<: *ef }
  - { name: 亚洲流媒体, type: select, proxies: [台湾节点,默认选择,直连,香港节点,日本节点,新加坡节点,美国节点], include-all: true, <<: *ef }
  - { name: 全球流媒体, type: select, proxies: [美国节点,默认选择,直连,香港节点,台湾节点,日本节点,新加坡节点], include-all: true, <<: *ef }
  - { name: 大陆流媒体, type: select, proxies: [直连,默认选择,香港节点,台湾节点,日本节点,新加坡节点,美国节点], include-all: true, <<: *ef }
  - { name: 加密货币, type: select, proxies: [美国节点,默认选择,直连,香港节点,台湾节点,日本节点,新加坡节点], include-all: true, <<: *ef }
  - { name: 测速, type: select, proxies: [默认选择,直连,香港节点,台湾节点,日本节点,新加坡节点,美国节点], include-all: true, <<: *ef }
  - { name: 游戏, type: select, proxies: [香港节点,默认选择,直连,台湾节点,日本节点,新加坡节点,美国节点], include-all: true, <<: *ef }
  - { name: 金融, type: select, proxies: [香港节点,默认选择,直连,台湾节点,日本节点,新加坡节点,美国节点], include-all: true, <<: *ef }
  - { name: 云服务, type: select, proxies: [香港节点,默认选择,直连,台湾节点,日本节点,新加坡节点,美国节点], include-all: true, <<: *ef }
  - { name: 谷歌, type: select, proxies: [美国节点,默认选择,直连,香港节点,台湾节点,日本节点,新加坡节点], include-all: true, <<: *ef }
  - { name: 微软, type: select, proxies: [直连,默认选择,香港节点,台湾节点,日本节点,新加坡节点,美国节点], include-all: true, <<: *ef }
  - { name: 苹果, type: select, proxies: [直连,默认选择,香港节点,台湾节点,日本节点,新加坡节点,美国节点], include-all: true, <<: *ef }
  - { name: 飞跃长城, type: select, proxies: [默认选择,直连,香港节点,台湾节点,日本节点,新加坡节点,美国节点], include-all: true, <<: *ef }
  # 这5个最快去除了高倍率节点
  - { name: 香港最快, type: url-test, include-all: true, tolerance: 20, interval: 300, <<: [*hk_s, *ef] }
  - { name: 台湾最快, type: url-test, include-all: true, tolerance: 20, interval: 300, <<: [*tw_s, *ef] }
  - { name: 日本最快, type: url-test, include-all: true, tolerance: 20, interval: 300, <<: [*jp_s, *ef] }
  - { name: 新加坡最快, type: url-test, include-all: true, tolerance: 20, interval: 300, <<: [*sg_s, *ef] }
  - { name: 美国最快, type: url-test, include-all: true, tolerance: 20, interval: 300, <<: [*us_s, *ef] }
  # 故障转移没有去除高倍率
  - { name: 香港故转, type: fallback, include-all: true, tolerance: 20, interval: 300, filter: '(?i)^(?=.*(?:🇭🇰|香港|HK|HKG|Hong\s*Kong|HongKong)).*$', <<: *ef }
  - { name: 台湾故转, type: fallback, include-all: true, tolerance: 20, interval: 300, filter: '(?i)^(?=.*(?:🇹🇼|台湾|台灣|\bTW\b|\bTWN\b|Taiwan|Taipei)).*$', <<: *ef }
  - { name: 日本故转, type: fallback, include-all: true, tolerance: 20, interval: 300, filter: '(?i)^(?=.*(?:🇯🇵|日本|\bJP\b|\bJPN\b|Japan|Tokyo|Osaka)).*$', <<: *ef }
  - { name: 新加坡故转, type: fallback, include-all: true, tolerance: 20, interval: 300, filter: '(?i)^(?=.*(?:🇸🇬|新加坡|\bSG\b|\bSGP\b|Singapore)).*$', <<: *ef }
  - { name: 美国故转, type: fallback, include-all: true, tolerance: 20, interval: 300, filter: '(?i)^(?=.*(?:🇺🇸|美国|美國|\bUS\b|\bUSA\b|United\s*States|America)).*$', <<: *ef }
  - { name: 直连, type: select, proxies: [DIRECT] }
  - { name: 去广告, type: select, proxies: [REJECT, DIRECT] }
# =========================
# 端口监听配置（可选）
# =========================
